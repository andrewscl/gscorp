<th:block th:fragment="content">

  <div class="email-invitation-card">

    <div class="email-info-card-container">

        <div class="email-info-card-logo">
            <div class="logo">
                <img src="https://sesan.cl/img/logo-mail.png" alt="SESAN Logo">
            </div>
        </div>

        <div class="email-info-card-title">
            <h1>Bienvenido a la plataforma!</h1>
        </div>

    </div>






        <div class="email-body-form">
            <p>Hola, [Nombre del usuario]</p>
            <p>Te escribimos para informarte que has sido invitado a unirte a la plataforma SESAN.</p>
            <p>Para aceptar la invitación, haz clic en el siguiente enlace:</p>
            <button th:href="@{${invitationLink}}" class="btn-primary">Aceptar Invitación</button>
        </div>

        <div class="email-footer-form">
            <p>Si no has solicitado esta invitación, puedes ignorar este correo.</p>
        </div>

    </div>

</th:block>
