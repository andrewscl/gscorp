<div th:fragment="tabPanelCard(title, tabs, customClass)"
            class="tab-panel-card" th:classappend="${customClass}">

  <div class="tabs-container">
    <button th:each="tab, iterStat : ${tabs}"
            class="tab"
            th:classappend="${iterStat.index == 0} ? 'active' : ''"
            th:data-index="${iterStat.index}"
            th:text="${tab.label}">
    </button>
  </div>

  <div th:each="tab, iterStat : ${tabs}"
       class="tab-content"
       th:classappend="${iterStat.index == 0} ? 'active' : ''"
       th:id="'tab-' + ${iterStat.index}">
    <th:block th:replace="~{${tab.contentFragment}}"></th:block>
  </div>

</div>
