<th:block th:fragment="rows">
  <tr th:each="p : ${punchs}" th:attr="data-id=${p.id}">

    <td th:text="${#temporals.format(p.ts, 'yyyy-MM-dd HH:mm')}"></td>
    <td th:text="${p.siteName != null ? p.siteName : '—'}"></td>
    <td th:text="${p.employeeName != null ? p.employeeName + ' ' + p.employeeFatherSurname: '—'}"></td>
    <td th:text="${p.action != null ? (p.action == 'IN' ? 'Entrada' : 'Salida') : '—'}"></td>
    <td th:text="${p.distanceM != null ? #numbers.formatDecimal(p.distanceM, 1, 2) : '—'} + ' mts'"></td>
    <td class="actions">
      <button type="button"
              class="btn-view"
              th:attr="data-path=@{/private/attendance/show/{id}(id=${p.id})}">
              Ver
      </button>
      <button type="button"
              class="btn-edit"
              th:attr="data-path=@{/private/attendance/edit/{id}(id=${p.id})}"
              th:if="${#authorization.expression('hasRole(''ADMINISTRATOR'')')}">
              Editar
      </button>
    </td>
  </tr>

  <tr th:unless="${punchs != null and !punchs.isEmpty()}">
    <td colspan="100" style="text-align:center; padding: 2rem;">No hay datos disponibles</td>
  </tr>

</th:block>
