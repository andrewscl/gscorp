<th:block th:fragment="rows">
        <tr th:each="hrdt : ${hrDocumentTypes}">
            <td th:text="${hrdt.name}"></td>
            <td th:text="${hrdt.status}"></td>
            <td th:text="${hrdt.targetProcess}"></td>
            <td class="actions">
                <button type="button"
                        class="btn btn-view"
                        th:attr="data-path=@{/private/termination-requests/fragments/view/{externalId}(externalId=${e.externalId()})}">
                Ver
                </button>
                <button type="button"
                        class="btn btn-edit"
                        th:if="${#authorization.expression('hasRole(''ADMINISTRATOR'') or hasRole(''RRHH'')')}"
                        th:attr="data-path=@{/private/termination-requests/fragments/edit/{externalId}(externalId=${e.externalId()})}">
                Editar
                </button>
            </td>
        </tr>
        <tr th:unless="${hrDocumentTypes != null and !hrDocumentTypes.isEmpty()}">
            <td colspan="100" style="text-align:center; padding: 2rem;">No hay datos disponibles</td>
        </tr>
        <tr>
            <td colspan="100" style="display: none !important; padding: 0; border: none;">
                <input type="hidden" id="hr-document-types-count" th:value="${count != null ? count : (employeesPage != null ? employeesPage.totalElements : 0)}" />
            </td>
        </tr>

</th:block>
