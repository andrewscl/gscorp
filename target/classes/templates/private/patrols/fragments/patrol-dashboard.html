<div th:fragment="content" class="patrol-dashboard-card">
    
    <header class="patrol-dashboard-card__header">
        <h3 class="patrol-dashboard-card__title">Panel de Patrullajes</h3>
    </header>



    <div class="patrol-dashboard-map">
        <h3 id="lblSiteName" th:text="${SiteName}">🏢 Detectando Instalación...</h3>
        <div class="content" id="map"></div>
    </div>

    <div class="patrol-dashboard-sections">

        <div class="patrol-section" id="schedules-section">
            <div class="patrol-section__header">
                <span class="patrol-section__subtitle">Obligatorio</span>
                <h4 class="patrol-section__title">📅 Agenda de Rondas del Día</h4>
            </div>
            
            <div id="patrolSchedulesContainer" class="patrol-grid">
                <div class="patrol-loader-placeholder">
                    <small class="text-muted">Buscando tu agenda de hoy...</small>
                </div>
            </div>
        </div>

        <div class="patrol-section" id="free-routes-section">
            <div class="patrol-section__header">
                <span class="patrol-section__subtitle">Acción Inmediata</span>
                <h4 class="patrol-section__title">⚡ Iniciar Patrullaje de Contingencia</h4>
            </div>

            <div id="patrolFreeTemplatesContainer" class="patrol-grid">
                <div class="patrol-loader-placeholder">
                    <small class="text-muted">Cargando rutas de contingencia...</small>
                </div>
            </div>
        </div>

        <div class="patrol-section" id="history-section">
            <div class="patrol-section__header">
                <h4 class="patrol-section__title">📋 Últimos Patrullajes Realizados</h4>
            </div>
            
            <div id="patrolHistoryContainer" class="patrol-list-compact">
                </div>
        </div>

    </div>


    <div class="patrol-dashboard-footer-actions">
        <button class="btn-back" id="backToEmployeeDashboard" type="button">
            ↩️ Volver al Menú Principal
        </button>
    </div>


    <script type="module" src="/js/private/mobile/dashboard/patrol-dashboard.js" defer></script>
</div>
