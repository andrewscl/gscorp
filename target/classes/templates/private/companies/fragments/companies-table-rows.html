<th:block th:fragment="rows">
    <tr th:each="company : ${companiesPage.content}">
        <td th:text="${company.name}"></td>
        <td th:text="${company.legalName}"></td>
        <td th:text="${company.taxId}"></td>
        <td th:text="${company.status.displayName}"></td>

        <td class="actions">
    <button type="button" class="btn-view"
                th:attr="data-path=@{/private/companies/show/{externalId}(externalId=${company.externalId})}">
        Ver
    </button>

    <button type="button" class="btn-edit"
                th:attr="data-path=@{/private/companies/edit/{externalId}(externalId=${company.externalId})}">
        Editar
    </button>

        </td>
    </tr>
</th:block>
