<div class="edit-shift-request">

  <div class="panel-container">

    <div class="panel-main">
    <input type="hidden" id="shiftRequestExternalId"
                        th:value="${shiftRequest.externalId}" />

      <div class="panel-header">
        <h3>Editar Solicitud de Turno</h3>
      </div>

      <div class="panel-body">
        <div class="form-group">
          <label>Sitio</label>
          <span class="readonly-field"
                th:text="${shiftRequest.site != null ? shiftRequest.site.name : '—'}">—</span>
        </div>

        <hr class="form-separator" />

        <div class="form-row">
          <div class="form-group">
            <label>Código</label>
            <span th:text="${shiftRequest.code != null ? shiftRequest.code : ''}"></span>
          </div>
          <div class="form-group">
            <label>Tipo</label>
            <span th:text="${shiftRequest.type != null ? shiftRequest.type.displayName : ''}"></span>
          </div>
          <div class="form-group">
              <label>Estado</label>
              <select id="shiftRequestStatus" th:field="${shiftRequest.status}" required>
              <option value="">Seleccione estado</option>
              <option th:each="b : ${shiftRequestStatuses}"
                      th:value="${b}"
                      th:text="${b.displayName}"></option>
              </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Fecha inicio</label>
            <input id="shiftRequestStartDate" name="startDate" type="date"
                  th:value="${shiftRequest.startDate != null ? #temporals.format(shiftRequest.startDate,'yyyy-MM-dd') : ''}" />
          </div>
          <div class="form-group">
            <label>Fecha término</label>
            <input id="shiftRequestEndDate" name="endDate" type="date"
                  th:value="${shiftRequest.endDate != null ? #temporals.format(shiftRequest.endDate,'yyyy-MM-dd') : ''}" />
          </div>
        </div>

        <div class="form-group">
          <label for="shiftRequestDescription">Descripción</label>
          <textarea id="shiftRequestDescription" name="description" placeholder="Descripción"
                    th:text="${shiftRequest.description != null ? shiftRequest.description : ''}"></textarea>
        </div>

      </div>
    </div>

    <div class="panel-aside">
      <div class="schedules-table">
        <div class="title-row">
          <div class="title-left">
            <span class="title-text">Días / Tramos</span>
          </div>
        </div>

          <!-- Si no hay schedules -->
          <div class="schedules-list" 
                th:if="${shiftRequest.schedules == null or #lists.isEmpty(shiftRequest.schedules)}">—</div>
          <!-- Si hay schedules, mostramos una tabla -->
          <div class="schedules-list" 
                th:if="${shiftRequest.schedules != null and !#lists.isEmpty(shiftRequest.schedules)}">
            <table class="table">
              <thead>
                <tr>
                  <th>Día(s)</th>
                  <th>Inicio</th>
                  <th>Término</th>
                  <th>Colación</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="s : ${shiftRequest.schedules}">
                  <td th:text="${(s.dayFrom != null ? s.dayFrom.displayNameInSpanish : '')
                                      + ( (s.dayTo != null && s.dayTo != s.dayFrom) ? ' - ' + s.dayTo.displayNameInSpanish : '' )}">Lunes</td>
                  <td th:text="${s.startTime != null ? #temporals.format(s.startTime, 'HH:mm') : '—'}">08:30</td>
                  <td th:text="${s.endTime != null ? #temporals.format(s.endTime, 'HH:mm') : '—'}">20:30</td>
                  <td th:text="${s.lunchTime != null ? #temporals.format(s.lunchTime, 'HH:mm') : '—'}">13:30</td>
                </tr>
              </tbody>
            </table>
          </div>
      </div>

      <div class="shifts-table">
          <div class="title-row">
            <div class="title-left">
              <span class="title-text">Turnos</span>
            </div>
          <button id="btnShiftsUpdate" class="btn btn-shifts-update">Actualizar turnos</button>
          </div>
          <div class="shifts-list" 
                th:if="${shifts != null and #lists.isEmpty(shifts)}">
            <table class="table">
              <thead>
                <tr>
                  <th>Fecha</th>
                  <th>Inicio</th>
                  <th>Término</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="shifts-table-body">
                <tr th:each="s : ${shifts}">
                  <td th:text="${s.shiftDate != null ? s.shiftDate : '—'}">13-07-2026</td>
                  <td th:text="${s.startTs != null ? #temporals.format(s.startTs, 'HH:mm') : '—'}">20:30</td>
                  <td th:text="${s.endTs != null ? #temporals.format(s.endTs, 'HH:mm') : '—'}">20:30</td>
                  <td>-</td>
                </tr>
              </tbody>
            </table>
          </div>
      </div>

    </div>

  </div>

  <div th:replace="~{shared/fragments/form-alerts :: form-alerts}"></div>

  <div th:replace="~{shared/fragments/footer-buttons ::
                      footer-buttons(
                              true, 'Guardar',
                              true, 'Cancelar',
                              false, '')}"></div>

  <script type="module" src="/js/private/shift-requests/edit-shift-request.js"></script>

</div>
