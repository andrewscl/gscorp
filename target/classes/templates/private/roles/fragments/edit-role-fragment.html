<section th:fragment="content" class="editRole">

    <div class="hs-form">
    <input type="hidden" id="externalId" th:value="${externalId}">

        <div id="editRoleForm" class="body">

            <div class="hs-form-header">
                <h3>Editar Rol</h3>
            </div>

            <div class="form-group">
                <label for="Role">Role</label>
                <input type="role" id="role" name="role" th:value="${role.name}" required />
            </div>

            <div class="form-group">
                <label for="roleAccountType">Tipo de cuenta</label>
                <select id="roleAccountType" name="accountType">
                    <option value="">-- ninguno --</option>
                    <option th:each="at : ${accountTypes}"
                            th:value="${at.name()}"
                            th:text="${at.displayName}"
                            th:selected="${role.accountType != null and role.accountType == at}">
                    </option>
                </select>
            </div>

        </div>

        <div th:replace="~{shared/fragments/form-alerts :: form-alerts}"></div>

        <div th:replace="~{shared/fragments/footer-buttons ::
                            footer-buttons(
                                true, 'Actualizar role',
                                true, 'Cancelar',
                                false, '')}"></div>

    </div>

    <script type="module" src="/js/private/admin/roles/edit-role.js"></script>

</section>
