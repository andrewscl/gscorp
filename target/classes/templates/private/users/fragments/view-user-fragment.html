<div id="viewUserContainer" class="view-user-container"
                                        th:fragment="content">
    <input type="hidden" id="viewUserExternalId" th:value="${user.externalId}">

    <div class="hs-form-header">
      <h3>Usuario</h3>
    </div>

    <div class="body">

      <div class="form-row w-custom">
        <div class="form-group col-30">
            <label>Usuario</label>
            <span class="form-value" th:text="${user.username}"></span>
        </div>
        <div class="form-group col-50">
          <label>Empleado</label>
          <span class="form-value" th:text="${user.employeeName}"></span>
        </div>
      </div>

      <div class="form-group">
        <label>Mail</label>
        <span class="form-value"
                        th:text="${user.mail}"></span>
      </div>

      <div class="form-row w-custom">
        <div class="form-group col-50">
          <label>Empresas</label>
          <div id="userCompanies">
            <span th:each="company : ${companies}" 
                  th:if="${user.companyIds != null and user.companyIds.contains(company.id)}" 
                  th:text="${company.name}"
                  class="badge badge-info">
            </span>
          </div>
        </div>

        <div class="form-group col-50">
          <label>Clientes</label>
          <div id="userClients">
            <span th:each="client : ${clients}" 
                  th:if="${user.clientIds != null and user.clientIds.contains(client.id)}" 
                  th:text="${client.name}"
                  class="badge badge-info">
            </span>
          </div>
        </div>
      </div>

      <div class="form-row w-custom">
        <div class="form-group col-50">
            <label>Estado</label>
            <span class="form-value" th:text="${user.status.getDisplayName()}"></span>
        </div>
        <div class="form-group col-50">
            <label>Active</label>
            <span class="form-value" th:text="${user.active}"></span>
        </div>
      </div>

    </div>

    <div th:replace="~{shared/fragments/form-alerts :: form-alerts}"></div>

    <div th:replace="~{shared/fragments/footer-buttons ::
                          footer-buttons(
                                  true, 'Re-enviar invitación',
                                  true, 'Volver',
                                  false, '')}">
    </div>

  <script type="module" src="/js/private/admin/users/view-user.js"></script>

</div>
