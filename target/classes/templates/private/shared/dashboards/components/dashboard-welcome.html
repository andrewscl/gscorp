<header th:fragment="content(emp)" class="dashboard-welcome">
    <div class="welcome-text">
        <h2 class="welcome-text__title">¡Hola, [[${emp.name}]]! 👋</h2>
        <p class="welcome-text__subtitle">Buenos días. Recuerda marcar tu entrada de hoy.</p>
    </div>
    <div class="welcome-date">
        <span class="welcome-date__badge"
            th:text="${#temporals.format(#temporals.createNow(), 'EEEE, dd \'de\' MMMM', 'es_ES')}">Lunes, 18 de Mayo</span>
    </div>
</header>
