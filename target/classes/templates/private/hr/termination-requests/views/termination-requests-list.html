<div th:replace="~{shared/fragments/table-component :: smart-table(
        title='Gestión de desvinculaciones',
        count=${count},
        filters=~{::#employeeTransitionRequestFilters},
        actions=~{::#employeeTransitionRequestActions},
        thead=~{::#employeeTransitionRequestHeader},
        tbody=~{private/hr/transition-requests/fragments/termination-requests-rows :: rows},
        customClass='employee-transition-request-list'
    )}">

        <th:block id="employeeTransitionRequestFilters">
            <div class="filter-item">
                <span class="filter-label">Estado</span>
                <select id="filter-employee-status" class="filter-input" name="status">
                    <option value="">Todos los estados</option>
                    <option th:each="tr : ${terminationReasons}"
                            th:value="${tr}"
                            th:text="${tr.displayName}"
                            th:selected="${tr == currentStatus}"></option>
                </select>
            </div>

            <div class="filter-item">
                <span class="filter-label">Busqueda</span>
                <input id="filter-q" class="filter-input" type="text" name="q"
                            th:value="${q}" placeholder="nombre, rut, mail, o telefono..."/>
            </div>

            <div class="filter-item item-action">
                <button class="btn btn-primary" id="searchEmployeesTransitionRequestBtn">
                Buscar
                </button>
            </div>
        </th:block>

        <th:block id="employeeTerminationActions">
            <button class="btn btn-primary" id="addTerminationRequest"
                th:if="${#authorization.expression('hasRole(''ADMINISTRATOR'') or hasRole(''RRHH'')')}">
            Crear Solicitud
            </button>
        </th:block>

        <tr id="employeeTransitionRequestHeader">
            <th>Foto</th>
            <th>Nombre</th>
            <th>Telefono</th>
            <th>Estado</th>
            <th>Actions</th>
        </tr>

</div>

    <script type="module" src="/js/private/hr/employee-transitions/termination-requests-list.js"></script>
