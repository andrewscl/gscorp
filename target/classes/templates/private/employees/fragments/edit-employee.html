<div class="edit-employee" th:fragment="content">

    <input type="hidden" id="employeeExternalId" th:value="${employee.externalId}">
    <input type="hidden" id="employeeId" th:value="${employee.id}">
    <input type="hidden" id="employeePositionId" th:value="${employee.positionId}">

    <div class="edit-employee-header">
        <div class="edit-header-foto" id="employeePhoto">
            <img th:src="${employee.photoUrl != null ? employee.photoUrl : '/img/default-avatar.png'}" 
                alt="Foto del empleado" id="employeePhotoPreview">
            <input type="file" id="employeePhotoInput" name="photoFile" accept="image/*" style="display: none;" />
            <button type="button" class="btn-change-photo" id="changePhotoBtn">
                Cambiar foto</button>
        </div>
        <div class="edit-header-text">
            <div class="edit-header-text-title">
                <h3>Editar empleado</h3>
            </div>
            <div class="edit-header-text-info">
                <span th:text="${employee.name + ' ' +
                                    employee.fatherSurname + ' ' +
                                    employee.motherSurname}"></span>
                <span th:text="${employee.position}"></span>
                <span th:text="${employee.mail + ' | ' + employee.phone}"></span>
            </div>
        </div>

        <div th:replace="~{shared/fragments/buttons :: genericButtons(
            true, 'Guardar',
            true, 'Cancelar',
            false, ''
            )}">
        </div>
    </div>

    <div th:replace="~{shared/fragments/form-alerts :: form-alerts}"></div>

    <div th:replace="~{shared/fragments/panels/tab-panel-card :: tabPanelCard(
        title='Empleado',
        tabs=${employeeTabs},
        customClass='employee-tabs'
        )}">
    </div>

</div>

<script type="module" src="/js/private/employees/edit-employee.js"></script>
