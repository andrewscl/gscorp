<div class="view-employee" th:fragment="content">

    <div class="view-employee-header">

        <div class="ve-header-foto">
            <div id="employeePhotoPreview">
                <img th:if="${employee.photoUrl != null}" 
                    th:src="${employee.photoUrl}" 
                    alt="Foto del empleado">
                
                <svg th:unless="${employee.photoUrl != null}" 
                    xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
            </div>
        </div>

        <div class="ve-header-text">
            <div class="ve-header-text-title">
                <h3>Ver empleado</h3>
            </div>
            <div class="ve-header-text-info">
                <span th:text="${employee.name + ' ' +
                                    employee.fatherSurname + ' ' +
                                    employee.motherSurname}"></span>
                <span th:text="${employee.position}"></span>
                <span th:text="${employee.mail + ' | ' + employee.phone}"></span>
            </div>
        </div>

        <div th:replace="~{shared/fragments/buttons :: genericButtons(
            false, '',
            true, 'Volver',
            false, ''
            )}">
        </div>

    </div>

    <div th:replace="~{shared/fragments/panels/tab-panel-card :: tabPanelCard(
        title='Empleado',
        tabs=${employeeTabs},
        customClass='employee-tabs'
        )}">
    </div>

</div>

<script type="module" src="/js/private/employees/view-employee.js"></script>
