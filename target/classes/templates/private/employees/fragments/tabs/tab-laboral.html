<th:block th:fragment="tabLaboral">
    <div class="dual-panel-card">
        <div class="panel-main">
            <h3>Información Laboral</h3>
            <div class="form-group">
                <label>Posición:</label>
                <input th:value="${employee.position.name}" readonly>
            </div>
            <div class="form-group">
                <label>Tipo de Contrato:</label>
                <input th:value="${employee.contractType}" readonly>
            </div>
            <div class="form-group">
                <label>Horario:</label>
                <input th:value="${employee.workSchedule}" readonly>
            </div>
            <div class="form-group">
                <label>Sistema de Turno:</label>
                <input th:value="${employee.shiftSystem}" readonly>
            </div>
            <div class="form-group">
                <label>Patrón de Turno:</label>
                <input th:value="${employee.shiftPattern}" readonly>
            </div>
            <div class="form-group">
                <label>Fecha de Contratación:</label>
                <input th:value="${employee.hireDate}" readonly>
            </div>
        </div>
        <div class="panel-aside">

            <div class="form-group">
                <h3>Proyectos Asignados</h3>
                <div class="badge-container">
                    <div th:if="${employee.projects.isEmpty()}">
                        <p>Sin proyectos asignados</p>
                    </div>
                    <span th:each="ep : ${employeeProjects}"
                            class="badge"
                            th:text="${ep.name}">
                    </span>
                </div>
            </div>

        </div>

    </div>
</th:block>
