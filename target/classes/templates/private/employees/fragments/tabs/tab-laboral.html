<th:block th:fragment="tabLaboral">
        <div class="dual-panel-tab">

            <div class="form-group">
                <label>Cargo:</label>
                <span th:value="${employee.position}"></span>
            </div>
            <div class="form-group">
                <label>Tipo de Contrato:</label>
                <span th:value="${employee.contractType}"></span>
            </div>
            <div class="form-group">
                <label>Horario:</label>
                <span th:value="${employee.workSchedule}"></span>
            </div>
            <div class="form-group">
                <label>Sistema de Turno:</label>
                <span th:value="${employee.shiftSystem}"></span>
            </div>
            <div class="form-group">
                <label>Patron de turno:</label>
                <span th:value="${employee.shiftPattern}"></span>
            </div>
            <div class="form-group">
                <label>Fecha de Contratación:</label>
                <span th:value="${employee.hireDate}"></span>
            </div>
            <div class="form-group">
                <label>Proyectos Asignados</label>
                <span th:each="ep : ${employeeProjects}"
                            class="badge"
                            th:text="${ep.name}">
                </span>
            </div>


    </div>
</th:block>
