<th:block th:fragment="tabFinanciero">
    <div class="panel-tab">

        <div class="panel-tab-column">
            <div class="form-group">
                <label>Método de Pago:</label>
                <span th:text="${employee.paymentMethod.displayName}"></span>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Banco:</label>
                    <span th:text="${employee.bank}"></span>
                </div>
                <div class="form-group">
                    <label>Tipo de Cuenta:</label>
                    <span th:text="${employee.bankAccountType.displayName}"></span>
                </div>
                <div class="form-group">
                    <label>N° Cuenta:</label>
                    <span th:text="${employee.bankAccountNumber}"></span>
                </div>
            </div>

            <div class="form-group">
                <label>Email:</label>
                <span th:text="${employee.mail}"></span>
            </div>
            <div class="form-group">
                <label>Teléfono:</label>
                <span th:text="${employee.phone}"></span>
            </div>
            <div class="form-group">
                <label>Teléfono Secundario:</label>
                <span th:text="${employee.secondaryPhone}"></span>
            </div>
        </div>
        <div class="panel-tab-column">
            <div class="form-row">
                <div class="form-group">
                    <label>Sistema Previsional:</label>
                    <span th:text="${employee.previtionalSystem.displayName}"></span>
                </div>
                <div class="form-group">
                    <label>Entidad de Pensión:</label>
                    <span th:text="${employee.pensionEntity.displayName}"></span>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Sistema de Salud:</label>
                    <span th:text="${employee.healthSystem.displayName}"></span>
                </div>
                <div class="form-group">
                    <label>Entidad de Salud:</label>
                    <span th:text="${employee.healthEntity.displayName}"></span>
                </div>
            </div>
        </div>
    </div>
</th:block>
