<tbody th:fragment="rows">
  <tr th:each="e : ${employees}">
    <td class="cell-photo">
      <img
        th:src="${e.photoUrl}"
        width="40" height="40"
        class="avatar avatar-sm" />
    </td>
    <td th:text="${e.fullName != null ? e.fullName : '—'}">Nombre Apellido</td>
    <td th:text="${e.positionName}">Cargo</td>
    <td th:text="${e.phone}">+56 9 1234 5678</td>
    <td th:text="${e.status}">Activo</td>

          <td class="actions">
            <button type="button"
                    class="btn-view"
                    th:attr="data-path=@{/private/employees/view/{externalId}(externalId=${e.externalId()})}">
              Ver
            </button>

            <button type="button"
                    class="btn-edit"
                    th:attr="data-path=@{/private/employees/edit/{externalId}(externalId=${e.externalId()})}">
              Editar
            </button>
          </td>

  </tr>

</tbody>
