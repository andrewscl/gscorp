<div class="create-employee" th:fragment="content">

    <div class="create-employee-header">
        <div class="create-header-foto" id="employeePhoto">
            <div class="employeePhotoPreview" id="employeePhotoPreview">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#9ca3af"
                        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 50%; height: 50%;">
                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
            </div>

            <input type="file" id="employeePhotoInput" name="photoFile" accept="image/*" style="display: none;" />
            
            <button type="button" class="btn-change-photo" id="changePhotoBtn">Subir foto</button>
        </div>

        <div class="create-header-text">
            <div class="create-header-text-title">
                <h3>Nueva Ficha de Contratación</h3>
            </div>
        </div>

        <div th:replace="~{shared/fragments/buttons :: genericButtons(
            true, 'Crear empleado',
            true, 'Cancelar',
            false, ''
            )}">
        </div>
    </div>

    <div th:replace="~{shared/fragments/form-alerts :: form-alerts}"></div>

    <div th:replace="~{shared/fragments/panels/tab-panel-card :: tabPanelCard(
        title='Empleado',
        tabs=${employeeTabs},
        customClass='employee-tabs'
        )}">
    </div>

    <script type="module" src="/js/private/employees/create-employee.js"></script>

</div>
