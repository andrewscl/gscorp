<div id="createClientContainer" class="create-client-container"
                                            th:fragment="content">

    <div class="hs-form-header">
      <h3>Crear Cliente</h3>
    </div>

    <div class="body" id="createClientForm">

      <div class="form-group">
        <label for="clientName">Nombre</label>
        <input type="text" id="clientName" name="name" placeholder="Nombre corto" required />
      </div>

      <div class="form-group">
        <label for="clientLegalName">Razón social</label>
        <input type="text" id="clientLegalName" name="legalName" placeholder="Razón social" required/>
      </div>

      <div class="form-group">
        <label for="clientTaxId">RUT / NIT</label>
        <input type="text" id="clientTaxId" name="taxId" placeholder="00.000.000-0" required/>
      </div>

      <div class="form-group">
        <label for="clientEmail">Mail contacto</label>
        <input type="email" id="clientEmail" name="contactEmail" placeholder="contacto@cliente.com" required/>
      </div>

      <div class="form-group">
        <label for="clientPhone">Teléfono</label>
        <input type="text" id="clientPhone" name="contactPhone" placeholder="+56 9 1234 5678" />
      </div>

      <div class="form-group" style="display:flex;align-items:center;gap:.5rem">
        <input type="checkbox" id="clientActive" name="active" checked />
        <label for="clientActive" style="margin:0">Activo</label>
      </div>

    </div>

    <div th:replace="~{shared/fragments/form-alerts :: form-alerts}"></div>

    <div th:replace="~{shared/fragments/footer-buttons ::
                          footer-buttons(
                              true, 'Crear cliente',
                              true, 'Cancelar',
                              false, '')}"></div>


    <script type="module" src="/js/private/clients/create-client.js"></script>

</div>
