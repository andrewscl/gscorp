<div id="editUserContainer" class="edit-user-container"
                                        th:fragment="content">

    <div class="hs-form-header">
      <h3>Ver Cliente</h3>
    </div>

    <div class="body">

      <div class="form-group col-20">
          <label>Empresa</label>
          <span class="form-value" th:text="${client.company().name()}"></span>
      </div>      

      <div class="form-row w-custom">
        <div class="form-group col-20">
            <label>ID</label>
            <span class="form-value" th:text="${client.id()}"></span>
        </div>
        <div class="form-group col-30">
            <label>Empresa</label>
            <span class="form-value" th:text="${client.name()}"></span>
        </div>
        <div class="form-group col-50">
          <label>Razón social</label>
          <span class="form-value" th:text="${client.legalName()}"></span>
        </div>
      </div>

      <div class="form-row w-custom">
        <div class="form-group col-20">
            <label>Rut</label>
            <span class="form-value" th:text="${client.taxId()}"></span>
        </div>
        <div class="form-group col-30">
            <label>Email</label>
            <span class="form-value" th:text="${client.email()}"></span>
        </div>
        <div class="form-group col-50">
          <label>Telefono</label>
          <span class="form-value" th:text="${client.phone()}"></span>
        </div>
      </div>

      <div class="form-row w-custom">
        <div class="form-group col-50">
            <label>Estado</label>
            <span class="form-value" th:text="${client.status()}"></span>
        </div>
        <div class="form-group col-50">
            <label>Active</label>
            <span class="form-value" th:text="${client.active()}"></span>
        </div>
      </div>

    </div>

    <div th:replace="~{shared/fragments/form-alerts :: form-alerts}"></div>

    <div th:replace="~{shared/fragments/footer-buttons ::
                          footer-buttons(
                                  false, '',
                                  true, 'Volver',
                                  false, '')}">
    </div>

  <script type="module" src="/js/private/clients/view-client.js"></script>

</div>
