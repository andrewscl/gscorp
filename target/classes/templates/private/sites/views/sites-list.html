<div th:replace="~{shared/fragments/table-component :: smart-table(
    title='Gestión de Sitios',
    count=${sitesCount},
    filters=~{::#siteFilters},
    actions=~{::#siteActions},
    thead=~{::#siteHeader},
    tbody=~{private/sites/fragments/site-table-rows :: rows},
    customClass='sites-table'
)}">

    <th:block id="siteFilters">

        <div class="filter-item">
            <span class="filter-label">Sitios</span>
            <select id="filter-dept" class="filter-input" name="siteId" required>
                <option value="">Todos los sitios</option>
                <option th:each="s : ${sites}"
                        th:value="${s.id}"
                        th:text="${s.name}"></option>
            </select>
        </div>

        <div class="filter-item">
            <span class="filter-label">Nombre</span>
            <input id="filter-name" class="filter-input" type="text"
                        placeholder="Buscar sitio..."/>
        </div>
    </th:block>

    <th:block id="siteActions">
        <button class="btn btn-secondary" id="exportCsv">
        Exportar CSV
        </button>

        <button class="btn btn-primary" id="viewSitesMapBtn">
        Ver mapa
        </button>
        
        <button class="btn btn-primary" id="addSiteBtn"
        th:if="${#authorization.expression('hasRole(''ADMINISTRATOR'')')}">
        Nuevo Sitio
        </button>
    </th:block>

    <tr id="siteHeader">
        <th>ID</th>
        <th>Nombre</th>
        <th>Dirección</th>
        <th>Proyecto</th>
        <th>Zona horaria</th>
        <th>Estado</th>
        <th>acciones</th>
    </tr>

</div>

<script type="module" src="/js/private/sites/sites-table.js"></script>
