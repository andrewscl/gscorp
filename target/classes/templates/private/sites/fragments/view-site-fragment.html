<section th:fragment="content">

  <div class="view-site">
  <input type="hidden" id="siteId" th:value="${site.id}" />

  <div class="info-card">

    <div class="header">
      <h3>Editar Sitio</h3>
      <p class="meta-id"><strong>ID:</strong> <span th:text="${site.id}"></span></p>
    </div>

    <div id="viewSite" class="body">

      <div class="form-group">
        <label>Proyecto</label>
        <span class="readonly-field"
          th:text="${site.project != null ? site.project.name : '—'}"></span>
        <input type="hidden" name="projectId"
          th:value="${site.project != null ? site.project.id : ''}" />
      </div>

      <hr class="form-separator" />

      <div class="form-group">
          <label>Nombre</label>
          <span th:text="${site.name}"></span>
      </div>

      <div class="form-group">
          <label>Dirección</label>
          <span th:text="${site.address}"></span>
        </div>

      <div class="form-row">

      <div class="form-group">
          <label>Latitud</label>
          <span th:text="${site.lat}"></span>
      </div>

      <div class="form-group">
          <label>Longitud</label>
          <span th:text="${site.lon}"></span>
      </div>

      </div>

        <div class="form-group">
          <label>Zona horaria</label>
          <span th:text="${site.timeZone}"></span>
        </div>

        <div class="form-group">
          <label>Activo</label>
          <span th:text="${site.active}"></span>
        </div>

    </div>

  </div>

  <div class="map-container"></div>

    <div th:replace="~{shared/fragments/form-alerts :: form-alerts}"></div>

    <div th:replace="~{shared/fragments/footer-buttons ::
                        footer-buttons(false, 'Actualizar usuario', 'Eliminar usuario')}"></div>

    </div>

  <script type="module" src="/js/private/sites/edit-site.js"></script>

</section>
