<section th:fragment="content">
    <input type="hidden" id="target-site-id" th:value="${targetSiteId}">
    <input type="hidden" id="target-patrol-externalId" th:value="${patrolExternalId}">
    <input type="hidden" id="checkpointsData" th:value="${checkpointsJson}" />

    <div id="patrols-map-section">

      <h3>Definir Checkpoints</h3>

      <div id="patrols-map-picker"></div>

    </div>

    <div class="checkpoint-controls mt-3">
        <div class="d-flex checkpoint-actions">
            <button type="button" id="btn-clear-path" class="btn btn-danger btn-sm">
                <i class="fas fa-trash"></i> Limpiar Todo
            </button>
            <button type="button" id="btn-confirm-map" class="btn btn-success w-100 mt-2">
                Confirmar y Finalizar Ruta
            </button>
        </div>

        <div class="table-responsive" style="max-height: 200px; overflow-y: auto;">
            <table class="table table-hover table-sm mt-2">
                <thead class="table-dark" style="position: sticky; top: 0;">
                    <tr>
                        <th>Orden</th>
                        <th>Nombre</th>
                        <th>Latitud / Longitud</th>
                        <th>Tiempo permanencia (min)</th>
                        <th>Tiempo de transito (min)</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="checkpoint-list-body">
                    </tbody>
            </table>
        </div>

    </div>

    <script type="module" src="/js/private/patrols/patrol-map-picker.js"></script>

</section>
