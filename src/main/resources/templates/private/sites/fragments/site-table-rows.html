<th:block th:fragment="rows">

    <tr th:each="s : ${sites}">
        <td th:text="${s.id}"></td>
        <td th:text="${s.name}"></td>
        <td th:text="${s.address}">—</td>
        <td th:text="${s.projectName != null ? s.projectName : '—'}">—</td>
        <td th:text="${s.timeZone}">—</td>
        <td>
            <span class="tag"
                  th:text="${s.active} ? 'Activo' : 'Inactivo'">Activo</span>
        </td>

        <td class="actions">
            <button type="button"
                    class="btn-link"
                    th:attr="data-path=@{/private/sites/show/{id}(id=${s.id})}">
              Ver
            </button>
            <button type="button"
                    class="btn-link"
                    th:attr="data-path=@{/private/sites/edit/{id}(id=${s.id})}"
                    th:if="${#authorization.expression('hasRole(''ADMINISTRATOR'')')}">
              Editar
            </button>
        </td>

    </tr>

</th:block>
