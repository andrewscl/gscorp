<th:block th:fragment="rows">
      <tr th:each="e : ${employees}">
          <td class="cell-photo">
            <img
              th:src="${e.photoUrl}"
              width="40" height="40"
              class="avatar avatar-sm" />
          </td>
          <td th:text="${e.fullName != null ? e.fullName : '—'}">Nombre Apellido</td>
          <td th:text="${e.positionName}">Cargo</td>
          <td th:text="${e.phone}">+56 9 1234 5678</td>
          <td th:text="${e.status.displayName}">Activo</td>

          <!-- Columna Estado de Acceso / Invitación (Blindada contra nulos) -->
          <td>
              <!-- Caso 1: Si no tiene usuario asociado en la BD (da null) -->
              <span th:if="${e.userStatus() == null}" class="badge bg-light text-muted">⚪ Sin Invitar</span>
              
              <!-- Caso 2: Si el empleado sí tiene un usuario asociado -->
              <th:block th:if="${e.userStatus() != null}">
                  <span th:class="${e.userStatus().name() == 'ACTIVE' ? 'badge bg-success-light text-success' : 
                                  e.userStatus().name() == 'INVITED' ? 'badge bg-warning-light text-warning' : 
                                  e.userStatus().name() == 'EXPIRED' ? 'badge bg-danger-light text-danger' : 'badge bg-secondary-light text-dark'}"
                        th:text="${e.userStatus().displayName}">
                        Estado Acceso
                  </span>
              </th:block>
          </td>

          <td class="actions">
            <button type="button"
                    class="btn-view"
                    th:attr="data-path=@{/private/employees/view/{externalId}(externalId=${e.externalId()})}">
              Ver
            </button>

            <button type="button"
                    class="btn-edit"
                    th:attr="data-path=@{/private/employees/edit/{externalId}(externalId=${e.externalId()})}">
              Editar
            </button>
          </td>
      </tr>

    <!-- ESCENARIO B: NO HAY RESULTADOS (Replicamos exactamente el diseño de tu smart-table) -->
    <tr th:unless="${employees != null and !employees.isEmpty()}">
        <td colspan="100" style="text-align:center; padding: 2rem;">No hay datos disponibles</td>
    </tr>

    <!-- FILA DE CONTROL GLOBAL: Siempre presente para el JS -->
      <tr>
          <td colspan="100" style="display: none !important; padding: 0; border: none;">
              <input type="hidden" id="sync-employees-count" th:value="${count != null ? count : (employeesPage != null ? employeesPage.totalElements : 0)}" />
          </td>
      </tr>

</th:block>
