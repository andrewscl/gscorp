<!-- Contenedor principal para la fila de bloques horarios -->
<div th:fragment="content" class="charts shifts-coverage-ingress-donut" id="shifts-coverage-ingress-donut">
    
    <template id="tmpl-hourly-donut-card">
        <!-- Tarjeta individual con disposición vertical -->
        <div class="card" data-card="hourly-shift-node">
            
            <!-- Contenedor del gráfico ECharts (Dona arriba) -->
            <div class="donut-wrapper">
                <div class="hourly-donut integrated" aria-hidden="true"></div>
            </div>
            
            <!-- Bloque de textos informativos (Textos abajo) -->
            <div class="card-info">
                <h5 class="block-title">-:-</h5>
                <div class="card-totals" aria-live="polite">
                    <span class="total-value">dos</span>
                    <span class="total-slash">/</span>
                    <span class="meta-value">-</span>
                    <span class="total-unit">turnos</span>
                </div>
            </div>

        </div>
    </template>

</div>
