<div th:fragment="operations-kpi-line-card" id="op-kpi-line-card" class="stats-grid">

  <div class="stat-card">
    <div class="stat-card__header">
      <h3 class="stat-card__title">Total Asistencias</h3>
      <th:block th:replace="~{shared/fragments/icons/common/clock-icons :: clock}"></th:block>
    </div>
    <div class="stat-card__body">
      <p class="stat-card__value" th:text="${totalAsistencias}">1,240</p>
      <p class="stat-card__label">Este mes</p>
      <span class="stat-card__trend trend-up">+12% vs mes anterior</span>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-card__header">
      <h3 class="stat-card__title">Patrullas Activas</h3>
      <th:block th:replace="~{shared/fragments/icons/common/clock-icons :: lightning}"></th:block>
    </div>
    <div class="stat-card__body">
      <p class="stat-card__value" th:text="${patrollasActivas}">24</p>
      <p class="stat-card__label">En ejecución</p>
      <span class="stat-card__trend trend-neutral">Sin cambios</span>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-card__header">
      <h3 class="stat-card__title">Alertas Pendientes</h3>
      <th:block th:replace="~{shared/fragments/icons/status/alert-icons :: alert}"></th:block>
    </div>
    <div class="stat-card__body">
      <p class="stat-card__value text-warning" th:text="${alertasPendientes}">8</p>
      <p class="stat-card__label">Requieren atención</p>
      <span class="stat-card__trend trend-down">-5% vs semana pasada</span>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-card__header">
      <h3 class="stat-card__title">Porcentaje Ocupación</h3>
      <th:block th:replace="~{shared/fragments/icons/analytics/percentages-icons :: percentage}"></th:block>
    </div>
    <div class="stat-card__body">
      <p class="stat-card__value" th:text="${porcentajeOcupacion}">87%</p>
      <p class="stat-card__label">Capacidad utilizada</p>
      <div class="progress-bar" style="width: 87%;"></div>
    </div>
  </div>

</div>
