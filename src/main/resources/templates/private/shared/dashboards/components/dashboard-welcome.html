<header th:fragment="content(emp)" class="dashboard-welcome">
    <div class="welcome-text">
        <h2 class="welcome-text__title">¡Hola, [[${emp.name}]]! 👋</h2>
        <p class="welcome-text__subtitle"
            th:text="${emoji + ' 'greeting + '. ' + message}"></p>
    </div>
    <div class="welcome-date">
        <span class="welcome-date__badge"
            th:text="${currentDate}">Lunes, 18 de Mayo</span>
    </div>
</header>
