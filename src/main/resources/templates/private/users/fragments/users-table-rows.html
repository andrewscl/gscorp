<th:block th:fragment="rows">
    <tr th:each="user : ${usersPage.content}">
        <td th:text="${user.id}"></td>
    <td th:text="${user.username}"></td>
        <td th:text="${user.mail}"></td>
        <td th:text="${user.roleName}"></td>
        <td th:text="${user.status.displayName}"></td>

        <td class="actions">
    <button type="button" class="btn-view"
                th:attr="data-path=@{/private/users/show/{externalId}(externalId=${user.externalId})}">
        Ver
    </button>

    <button type="button" class="btn-edit"
                th:attr="data-path=@{/private/users/edit/{externalId}(externalId=${user.externalId})}">
        Editar
    </button>

        </td>
    </tr>
</th:block>
