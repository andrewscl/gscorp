<div id="editUserContainer" class="edit-user-container"
                                        th:fragment="content">

    <div class="hs-form-header">
      <h3>Editar usuario</h3>
    </div>

    <div id="editUserForm" class="body">

      <div class="form-row w-custom">
        <div class="form-group col-20">
          <label for="userId">ID</label>
          <input type="text" id="userId" name="id" th:value="${user.id}" readonly />
        </div>
        <div class="form-group col-30">
          <label for="userUsername">Username</label>
          <input type="text" id="userUsername" name="username" th:value="${user.username}" required />
        </div>
      </div>

      <div class="form-group">
        <label for="userMail">Correo Electrónico</label>
        <input type="email" id="userMail" name="mail" th:value="${user.mail}" required />
      </div>

      <div class="form-group">
          <label for="userEmployeeId">Empleado Asociado</label>
          <select id="userEmployeeId" name="employeeId">
            <option value="">-- ninguno --</option>
            <option th:each="employee : ${employees}"
                    th:value="${employee.id}"
                    th:text="${employee.fullName != null ? employee.fullName : 'Empleado ' + employee.id}"
                    th:selected="${user.employeeId != null and user.employeeId == employee.id}">
            </option>
          </select>
      </div>

      <div class="form-row w-custom">
        <div class="form-group col-50">
          <label>Empresas</label>
          <select id="userCompanies" name="companyIds" multiple size="6">
            <option th:each="company : ${companies}" 
                    th:value="${company.id}" 
                    th:text="${company.name}" 
                    th:selected="${user.companyIds != null and user.companyIds.contains(company.id)}">
            </option>
          </select>
        </div>
        <div class="form-group col-50">
          <label for="userClients">Clientes</label>
          <select id="userClients" name="clientIds" multiple size="6">
            <option th:each="client : ${clients}"
                    th:value="${client.id}"
                    th:text="${client.name}"
                    th:selected="${user.clientIds != null and user.clientIds.contains(client.id)}">
            </option>
          </select>
        </div>
      </div>

      <div class="form-row w-custom">
        <div class="form-group col-50">
          <label for="userStatus">Estado</label>
          <span type="text" id="userStatus" name="status" th:text="${user.status.getDisplayName()}">
          </span>
        </div>
        <div class="form-group col-50">
          <label for="userActive">Activo</label>
          <input type="checkbox" id="userActive"
                                      name="active" th:checked="${user.active}" />
        </div>
      </div>

    </div>

    <div th:replace="~{shared/fragments/form-alerts :: form-alerts}"></div>

    <div class="hs-form-footer">
      <div th:replace="~{shared/fragments/footer-buttons ::
                          footer-buttons(
                                  true, 'Actualizar usuario',
                                  true, 'Cancelar',
                                  true, 'Eliminar usuario')}"></div>
    </div>

  <script type="module" src="/js/private/admin/users/edit-user.js"></script>

</div>
