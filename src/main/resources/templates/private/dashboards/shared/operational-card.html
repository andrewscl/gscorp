<div th:fragment="content" class="operational-card">
    <div class="operational-card__header">
        <h3 class="operational-card__title">Opciones Operacionales</h3>
    </div>
    
    <div class="operational-card__body">
        <button type="button" class="shortcut-item" id="btn-control-acceso">
            <div class="shortcut-item__icon-wrapper type--purple">
                <span class="shortcut-item-icon">🛡️</span>
            </div>
            <div class="shortcut-item__content">
                <h3 class="shortcut-title">Control de Acceso</h3>
                <p class="shortcut-desc">Registro del GS</p>
            </div>
        </button>

        <button type="button" class="shortcut-item" id="btn-registro-vehiculos">
            <div class="shortcut-item__icon-wrapper type--amber">
                <span class="shortcut-item-icon">🚗</span>
            </div>
            <div class="shortcut-item__content">
                <h3 class="shortcut-title">Registro de Vehículos</h3>
                <p class="shortcut-desc">Empadronamiento</p>
            </div>
        </button>

        <button type="button" class="shortcut-item" id="btn-control-rondas">
            <div class="shortcut-item__icon-wrapper type--red">
                <span class="shortcut-item-icon">🔄</span>
            </div>
            <div class="shortcut-item__content">
                <h3 class="shortcut-title">Control de Rondas</h3>
                <p class="shortcut-desc">Seguimiento en vivo</p>
            </div>
        </button>
    </div>

</div>
