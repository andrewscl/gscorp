<div th:fragment="content" id="admin-kpi-line-card" class="stats-grid">
        <!-- Usuarios Invitados -->
        <div class="stat-card">
            <div class="stat-card__header">
                <h3 class="stat-card__title">Usuarios Invitados</h3>
                <div th:replace="~{shared/fragments/icons/analytics/users-icons :: users}"></div>
            </div>
            <div class="stat-card__body">
                <p id="kpi-invited" class="stat-card__value">24</p>
                <span class="stat-card__trend trend-neutral">Sin cambios</span>
            </div>
        </div>

        <!-- Usuarios Activos -->
        <div class="stat-card">
            <div class="stat-card__header">
                <h3 class="stat-card__title">Usuarios Activos</h3>
                <div th:replace="~{shared/fragments/icons/analytics/users-icons :: users}"></div>
            </div>
            <div class="stat-card__body">
                <p id="kpi-active" class="stat-card__value">856</p>
                <span class="stat-card__trend trend-up">+12% vs mes anterior</span>
            </div>
        </div>

        <!-- Usuarios Inactivos -->
        <div class="stat-card">
            <div class="stat-card__header">
                <h3 class="stat-card__title">Usuarios Inactivos</h3>
                <div th:replace="~{shared/fragments/icons/analytics/users-icons :: users}"></div>
            </div>
            <div class="stat-card__body">
                <p id="kpi-inactive" class="stat-card__value">384</p>
                <span class="stat-card__trend trend-down">-5% vs mes anterior</span>
            </div>
        </div>

        <!-- Usuarios Expirados -->
        <div class="stat-card">
            <div class="stat-card__header">
                <h3 class="stat-card__title">Usuarios Expirados</h3>
                <div th:replace="~{shared/fragments/icons/status/alert-icons :: alert}"></div>
            </div>
            <div class="stat-card__body">
                <p id="kpi-expired" class="stat-card__value">45</p>
                <span class="stat-card__trend trend-warning">Acción requerida</span>
            </div>
        </div>

        <!-- Usuarios Suspendidos -->
        <div class="stat-card">
            <div class="stat-card__header">
                <h3 class="stat-card__title">Usuarios Suspendidos</h3>
                <div th:replace="~{shared/fragments/icons/status/alert-icons :: alert}"></div>
            </div>
            <div class="stat-card__body">
                <p id="kpi-suspended" class="stat-card__value">12</p>
                <span class="stat-card__trend trend-down">Acceso bloqueado</span>
            </div>
        </div>

</div>
