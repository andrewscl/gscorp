<div class="create-hr-document-type">

        <div class="panel-main">
            <div class="panel-header">
                <h4>Crear tipo de documento de Recursos Humanos</h4>
            </div>
            <div class="panel-body">
                <div class="form-group">
                <label>Nombre del documento:</label>
                <input type="text" id="name" required />
                </div>
                <div class="form-group">
                    <label>Proceso:</label>
                    <select id="hrProcessTypes" required>
                        <option value="">Seleccione un proceso</option>
                        <option th:each="hpt : ${hrProcessTypes}"
                                th:value="${hpt.name}"
                                th:text="${hpt.displayName}"></option>
                    </select>
                </div>
                <div class="form-row w-custom">
                    <div class="form-group fx-7">
                    <label>Estado:</label>
                    <select id="terminationReason" required>
                        <option value="">Seleccione estado</option>
                        <option th:each="es : ${employeeStatuses}"
                                th:value="${es.name}"
                                th:text="${es.displayName}"></option>
                    </select>
                    </div>
                </div>
            </div>
        </div>



    <div th:replace="~{shared/fragments/form-alerts :: form-alerts}"></div>
    <div th:replace="~{shared/fragments/footer-buttons ::
                            footer-buttons(
                                true, 'Crear tipo de documento',
                                true, 'Cancelar',
                                false, '')}"></div>

    <script type="module" src="/js/private/configuration/hr-document-types/create-hr-document-type.js"></script>
</div>
