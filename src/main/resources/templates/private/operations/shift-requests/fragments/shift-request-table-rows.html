      <th:block th:fragment="rows">
        <tr th:each="r : ${shiftRequests}" th:data-id="${r.id}">
          <td th:text="${r.externalId}">TR001</td>
          <td th:text="${r.siteName != null ? r.siteName : '—'}">Nombre sitio</td>
          <td th:text="${r.type != null ? r.type.displayName : '—'}">TIPO</td>
          <td th:text="${r.startDate != null ? #temporals.format(r.startDate, 'yyyy-MM-dd') : '—'}">2025-01-01</td>
          <td th:text="${r.endDate != null ? #temporals.format(r.endDate, 'yyyy-MM-dd') : '—'}">2025-12-31</td>

          <td class="actions">
            <button type="button" class="btn btn-view"
                    th:attr="data-path=@{/private/shift-requests/show/{shiftRequestExternalId}(shiftRequestExternalId=${r.externalId})}">
              Ver
            </button>

            <button type="button" class="btn btn-edit"
                    th:attr="data-path=@{/private/shift-requests/edit/{shiftRequestExternalId}(shiftRequestExternalId=${r.externalId})}"
                    th:if="${#authorization.expression('hasRole(''ADMINISTRATOR'')')}">
              Editar
            </button>
          </td>
        </tr>

        <tr th:unless="${shiftRequests != null and !shiftRequests.isEmpty()}">
          <td colspan="100" style="text-align:center; padding: 2rem;">No hay datos disponibles</td>
        </tr>
        <tr>
            <td colspan="100" style="display: none !important; padding: 0; border: none;">
                <input type="hidden" id="sync-shift-request-count"
                  th:value="${count != null ? count : (shiftRequestsPage != null ? shiftRequestsPage.totalElements : 0)}" />
            </td>
        </tr>

      </th:block>
