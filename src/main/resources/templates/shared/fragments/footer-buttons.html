<div class="hs-footer-actions"
        th:fragment = "footer-buttons(
                        showSubmit=false, submitText='Guardar',
                        showCancel=false, cancelText='Cancelar',
                        showDelete=false, deleteText='Eliminar')">

        <button th:if="${showSubmit}" type="submit" class="btn btn-primary" 
                th:text="${submitText}">
        </button>

        <button th:if="${showCancel}" type="button" class="btn btn-secondary"
                th:text="${cancelText}">
        </button>

        <button th:if="${showDelete}" type="button" class="btn btn-danger" 
                th:text="${deleteText}">
        </button>

</div>
