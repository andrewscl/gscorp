<div th:fragment
        ="footer-buttons(showSubmit, showCancel, showDelete,
                        submitText, cancelText, deleteText)"
                                        class="hs-footer-actions">

    <button th:if="${showSubmit}" 
            type="submit"  
            class="btn btn-primary" 
            th:text="${submitText ?: 'Guardar'}">
    </button>

    <button th:if="${showCancel}" 
            type="button" 
            class="btn btn-secondary"
            th:text="${cancelText ?: 'Cancelar'}">
    </button>

    <button th:if="${showDelete}" 
            type="button" 
            class="btn btn-danger" 
            th:text="${deleteText ?: 'Eliminar'}">
    </button>
</div>
