<div class="hs-footer-actions"
        th:fragment = "footer-buttons(
                        showSubmit=false, submitText='Guardar',
                        showCancel=false, cancelText='Cancelar',
                        showDelete=false, deleteText='Eliminar')">

        <th:block th:with="
                sSubmit=${showSubmit ?: false},
                sText=${submitText ?: 'Guardar'},
                sCancel=${showCancel ?: false},
                cText=${cancelText ?: 'Cancelar'},
                sDelete=${showDelete ?: false},
                dText=${deleteText ?: 'Eliminar'}">

        <button th:if="${sSubmit}" type="submit" class="btn btn-primary" 
                th:text="${sText}">
        </button>

        <button th:if="${sCancel}" type="button" class="btn btn-secondary"
                th:text="${cText}">
        </button>

        <button th:if="${sDelete}" type="button" class="btn btn-danger" 
                th:text="${dText}">
        </button>
</div>
