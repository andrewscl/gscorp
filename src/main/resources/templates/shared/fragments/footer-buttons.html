<div class="hs-footer-actions"
        th:fragment = "footer-buttons(
                        showSubmit, submitText,
                        showCancel, cancelText,
                        showDelete, deleteText)"
        th:with = "showSubmit=${showSubmit ?: false},
                  showCancel=${showCancel ?: false},
                  showDelete=${showDelete ?: false}">

    <button th:if="${showSubmit}"
            type="submit"  
            class="btn btn-primary" 
            th:text="${submitText ?: 'Guardar'}">
    </button>

    <button th:if="${showCancel}" 
            type="button" 
            class="btn btn-secondary"
            th:text="${cancelText ?: 'Cancelar'}">
    </button>

    <button th:if="${showDelete}" 
            type="button" 
            class="btn btn-danger" 
            th:text="${deleteText ?: 'Eliminar'}">
    </button>
</div>
