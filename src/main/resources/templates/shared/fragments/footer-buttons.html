<div th:fragment
        ="footer-buttons(showDelete, submitText, deleteText)"
                                class="hs-footer-actions">
    <!-- Botón Primario (Siempre visible) -->
    <button type="submit" 
            class="btn btn-primary" 
            th:text="${submitText ?: 'Guardar'}">
    </button>

    <!-- Botón Secundario (Siempre visible) -->
    <button type="button" 
            class="btn btn-secondary">Cancelar
    </button>

    <!-- Botón de Acción Peligrosa (Condicional) -->
    <button th:if="${showDelete}" 
            type="button" 
            class="btn btn-danger" 
            th:text="${deleteText ?: 'Eliminar'}">
    </button>
</div>
